<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>smart To-Do</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>Smart To-do App</h1>

        <input type="text" id="taskInput" placeholder="Enter a task">
        <button id="addTaskBtn">Add Task</button>

        <div id="controls">
            <button id="filterAllBtn">All</button>
            <button id="filterActiveBtn">Active</button>
            <button id="filterCompletedBtn">Completed</button>
            <button id="clearCompletedBtn">Clear Completed</button>
            <button id="clearAllBtn">Clear All</button>
        </div>

        <p id="stats"></p>

        <ul id="taskList"></ul>

        <script src="script.js"></script>   

    </body>
    </html>
